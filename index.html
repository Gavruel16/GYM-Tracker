        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        h1 { color: #4285F4; margin-bottom: 5px; font-size: 24px; }
        
        .search-bar { width: 95%; max-width: 450px; padding: 15px; border-radius: 30px; background: #222; border: 1px solid #444; color: white; margin-bottom: 10px; font-size: 16px; }
        .filter-container { margin: 10px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .filter-container button { padding: 8px 14px; font-size: 12px; background: #262626; border: 1px solid #444; border-radius: 20px; color: #ccc; cursor: pointer; }
        .filter-container button.active { background: #4285F4; color: white; border-color: #4285F4; }

        .fav-btn { position: absolute; top: 15px; left: 15px; font-size: 20px; cursor: pointer; color: #555; transition: 0.3s; }
        .fav-active { color: #f1c40f; }
        .yt-btn { position: absolute; top: 15px; right: 15px; background: #c4302b; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; font-size: 14px; font-weight: bold; cursor: pointer; }

        .controls-row { display: flex; justify-content: space-around; margin: 15px 0; gap: 10px; }
        .control-group { display: flex; flex-direction: column; align-items: center; background: #222; padding: 10px; border-radius: 12px; flex: 1; }
        .input-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        
        .stepper { display: flex; align-items: center; gap: 5px; }
        .btn-step { background: #333; color: white; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .input-field { width: 60px; background: transparent; border: none; color: white; text-align: center; font-size: 22px; font-weight: bold; font-family: monospace; }
        .meta-field { color: #27ae60; }

        .progress-bg { background: #333; border-radius: 10px; height: 14px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.3s ease; }
        
        .timer-box { margin-bottom: 15px; background: #111; padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .timer-display { font-family: monospace; font-size: 22px; color: #e67e22; font-weight: bold; min-width: 55px; }
        .btn-timer { background: #333; padding: 8px 15px; font-size: 13px; color: white; border: none; border-radius: 6px; }

        .btn-save { background: #4285F4; color: white; width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* GRÁFICO E APAGAR */
        .chart-container { width: 100%; display: none; margin-top: 15px; background: #111; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        .btn-delete-hist { background: #c53030; color: white; border: none; border-radius: 6px; padding: 8px; font-size: 11px; margin-bottom: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        canvas { max-height: 150px; width: 100% !important; }
        
        #sentinel { padding: 30px; color: #555; cursor: pointer; }
    </style>
</head>

// --- FILTROS ---
function setGrupo(g) {
    grupoAtual = g;
    mostrarFav = false;
    document.querySelectorAll('.filter-container button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    recarregarLista();
}

function toggleFav() {
    mostrarFav = !mostrarFav;
    document.getElementById("btn-fav").classList.toggle('active');
    recarregarLista();
}

// Adicionamos ASYNC aqui para o banco de dados responder
async function recarregarLista() {
    
    // --- BLOCO DA NUVEM: PUXAR DADOS DO SUPABASE ---
    if (usuario && usuario !== "convidado") {
        try {
            const { data: dadosNuvem, error } = await _supabase
                .from('treinos')
                .select('*')
                .eq('user_id', usuario);

            if (dadosNuvem && !error) {
                dadosNuvem.forEach(t => {
                    // Sincroniza Peso Atual, Meta e o Histórico do Gráfico
                    const key = usuario + "_" + t.exercicio;
                    localStorage.setItem(key, t.peso);
                    localStorage.setItem(key + "_meta", t.meta);
                    
                    if (t.historico) {
                        localStorage.setItem(key + "_hist", t.historico);
                    }
                });
                console.log("☁️ Nuvem sincronizada com sucesso!");
            }
        } catch (err) {
            console.error("Erro ao sincronizar nuvem:", err);
        }
    }
    // --- FIM DO BLOCO DA NUVEM ---

    const termo = document.getElementById("busca").value.toLowerCase();
    filtrados = maquinas.filter(m => {
        const matchesGrupo = (grupoAtual === "todos" || m.grupo === grupoAtual);
        const matchesBusca = m.nome.toLowerCase().includes(termo);
        const matchesFav = !mostrarFav || localStorage.getItem(usuario + "_" + m.nome + "_fav") === "true";
        return matchesGrupo && matchesBusca && matchesFav;
    });

    document.getElementById("lista").innerHTML = "";
    idxAtual = 0;
    renderMais();
}

function favoritar(nome, btn) {
    const key = usuario + "_" + nome + "_fav";
    const status = localStorage.getItem(key) === "true";
    localStorage.setItem(key, !status);
    btn.classList.toggle('fav-active');
    if(mostrarFav) recarregarLista();
}

        const card = document.createElement("div");
        card.className = "card";
       card.innerHTML = `
    <span class="fav-btn ${isFav?'fav-active':''}" onclick="favoritar('${m.nome}', this)">★</span>
    <button class="yt-btn" onclick="window.open('https://youtube.com/results?search_query=execução+${m.nome}')">?</button>

    <div class="progress-bg"><div id="bar-${id}" class="progress-bar" style="width:${porc}%; background:${porc==100?'#27ae60':'#4285F4'}"></div></div>

        <button class="btn-timer" onclick="iniciarTimer('${id}', 45)">45s</button>

            <button class="btn-step" onclick="step('${id}', 'p', 2)">+</button></div>
        </div>
        <div class="control-group">
            <span class="input-label">Meta</span>
            <div class="stepper"><button class="btn-step" onclick="step('${id}', 'm', -2)">-</button>
            <input type="number" id="m-${id}" value="${mt}" class="input-field meta-field">

        </div>
    </div>

    <input type="date" id="date-${id}" class="input-field" 
           style="width:90%; margin-bottom:10px; background:#222; color:white; border:1px solid #444; border-radius:10px; padding:5px; text-align:center;"

// --- UTILITÁRIOS ---
function step(id, type, val) {
    const el = document.getElementById(`${type}-${id}`);
    let n = parseFloat(el.value) || 0;
    n = Math.max(0, n + val);
    el.value = n;
}

function iniciarTimer(id, segs) {
    if (timers[id]) clearInterval(timers[id]);
    let t = segs;
    const d = document.getElementById("display-" + id);
    d.style.color = "#e67e22";
    timers[id] = setInterval(() => {
        t--; d.innerText = t + "s";
        if (t <= 0) { clearInterval(timers[id]); d.innerText = "FIM!"; d.style.color = "#27ae60"; }
    }, 1000);
}

async function salvar(nome, id) {
    const p = parseFloat(document.getElementById("p-"+id).value) || 0;
    const m = parseFloat(document.getElementById("m-"+id).value) || 0;
    
    // Pega a data do calendário do card
    const dataInput = document.getElementById("date-"+id).value; 
    const partes = dataInput.split('-');
    const dataH = `${partes[2]}/${partes[1]}`; // Ex: 31/03

    // Salva Local
    localStorage.setItem(usuario+"_"+nome, p);
    localStorage.setItem(usuario+"_"+nome+"_meta", m);

    let hist = JSON.parse(localStorage.getItem(usuario+"_"+nome+"_hist") || "[]");
    
    // Lógica da inclinação: só adiciona se o peso mudar
    if (hist.length === 0 || hist[hist.length - 1].peso !== p) {
        hist.push({ data: dataH + " " + new Date().getHours() + ":" + new Date().getMinutes(), peso: p });
    }
    if (hist.length > 15) hist.shift();
    localStorage.setItem(usuario+"_"+nome+"_hist", JSON.stringify(hist));

    // Atualiza a barra azul/verde
    const bar = document.getElementById("bar-"+id);
    const porc = m > 0 ? Math.min((p/m)*100, 100) : 0;
    bar.style.width = porc + "%";
    bar.style.background = porc === 100 ? '#27ae60' : '#4285F4';

    // Envia para o Supabase
// ENVIO PARA A NUVEM
    if(usuario !== "convidado") {
        const { error } = await _supabase.from('treinos').upsert({ 
            user_id: usuario, 
            exercicio: nome, 
            peso: p, 
            meta: m,
            historico: JSON.stringify(hist) // <--- ENVIA O GRÁFICO
        }, { onConflict: 'user_id, exercicio' });

        if (error) console.log("Erro Nuvem:", error.message);
        else console.log("✅ Salvo na Nuvem!");
    }
    
    renderizarGraficoReal(nome, id); // Atualiza o gráfico na hora
}

function alternarGrafico(nome, id) {
    const cont = document.getElementById("cont-" + id);
    if (cont.style.display === "block") {
        cont.style.display = "none";
    } else {
        cont.style.display = "block";
        registrarUso(nome); // <--- ADICIONE ESTA LINHA AQUI
        renderizarGraficoReal(nome, id);
    }
}

function renderizarGraficoReal(nome, id) {
    const ctx = document.getElementById("canvas-" + id).getContext('2d');
    const hist = JSON.parse(localStorage.getItem(usuario + "_" + nome + "_hist") || "[]");
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: hist.map(h => h.data),
            datasets: [{ label: 'kg', data: hist.map(h => h.peso), borderColor: '#4285F4', tension: 0.4, fill: true, backgroundColor: 'rgba(66, 133, 244, 0.1)' }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function excluirHistorico(nome, id) {
    if (confirm(`Tens a certeza que queres apagar todo o histórico de ${nome}?`)) {
        localStorage.removeItem(usuario + "_" + nome + "_hist");
        document.getElementById("cont-" + id).style.display = "none";
        if (charts[id]) {
            charts[id].destroy();
            delete charts[id];
        }
    }
}

async function syncForcado() {
    if(!usuario || usuario === "convidado") return alert("Faça login primeiro!");
    console.log("🔄 Sincronizando máquinas com a nuvem...");
    
    for (let m of maquinas) {
        const p = localStorage.getItem(usuario + "_" + m.nome) || 0;
        const meta = localStorage.getItem(usuario + "_" + m.nome + "_meta") || 0;
        const hist = localStorage.getItem(usuario + "_" + m.nome + "_hist") || "[]";

        if (p > 0 || meta > 0 || hist !== "[]") {
            const { error } = await _supabase.from('treinos').upsert({
                user_id: usuario,
                exercicio: m.nome,
                peso: parseFloat(p),
                meta: parseFloat(meta),
                historico: hist

    alert("✅ Nuvem e Local sincronizados!");

function gerarTop5() {
    let evolucoes = maquinas.map(m => {
        let hist = JSON.parse(localStorage.getItem(usuario + "_" + m.nome + "_hist") || "[]");
        if (hist.length < 2) return null;
        let ganho = hist[hist.length - 1].peso - hist[0].peso;
        return { nome: m.nome, ganho: ganho };
    }).filter(e => e !== null && e.ganho > 0);

    evolucoes.sort((a, b) => b.ganho - a.ganho);
    let msg = evolucoes.slice(0, 5).map((e, i) => `${i+1}º ${e.nome}: +${e.ganho}kg`).join('\n');
    alert(msg || "Nenhum dado de evolução suficiente ainda.");
}

    alert("✅ Adicionado!");
}

function verLogs() {
    alert(logsErros.length > 0 ? logsErros.join('\n') : "Nenhum erro de conexão hoje.");
}

async function stressTest(nomeEx) {
    if(!confirm("Gerar 100 pontos falsos para o exercício " + nomeEx + "?")) return;
    let fakeHist = [];
    let p = 20;
    for(let i=1; i<=100; i++) {
        p += Math.random() * 1.2;
        fakeHist.push({ data: `${i}/03 10:00`, peso: parseFloat(p.toFixed(1)) });
    }
    localStorage.setItem(usuario + "_" + nomeEx + "_hist", JSON.stringify(fakeHist));
    location.reload();
}
